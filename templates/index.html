<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Neupane Dental Clinic - Support Chat</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f4f8;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .chat-wrapper {
      width: 420px;
      height: 680px;
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.15);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Header */
    .chat-header {
      background: linear-gradient(135deg, #1a73e8, #0d47a1);
      color: #fff;
      padding: 18px 20px;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .avatar {
      width: 46px;
      height: 46px;
      background: #fff;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }

    .header-info h2 {
      font-size: 15px;
      font-weight: 600;
    }

    .header-info p {
      font-size: 12px;
      opacity: 0.85;
      margin-top: 2px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      background: #4caf50;
      border-radius: 50%;
      display: inline-block;
      margin-right: 5px;
    }

    /* Messages */
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      background: #f7f9fc;
    }

    .chat-messages::-webkit-scrollbar { width: 4px; }
    .chat-messages::-webkit-scrollbar-thumb { background: #ccc; border-radius: 4px; }

    .message {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      max-width: 88%;
      animation: fadeIn 0.25s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .message.bot { align-self: flex-start; }
    .message.user { align-self: flex-end; flex-direction: row-reverse; }

    .msg-avatar {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: #1a73e8;
      color: #fff;
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .message.user .msg-avatar {
      background: #e0e0e0;
      color: #555;
    }

    .bubble {
      padding: 10px 14px;
      border-radius: 18px;
      font-size: 13.5px;
      line-height: 1.55;
      max-width: 100%;
      word-wrap: break-word;
    }

    .message.bot .bubble {
      background: #fff;
      color: #333;
      border-bottom-left-radius: 4px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }

    .message.user .bubble {
      background: #1a73e8;
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    /* Typing indicator */
    .typing .bubble {
      display: flex;
      gap: 5px;
      align-items: center;
      padding: 12px 16px;
    }

    .dot {
      width: 7px;
      height: 7px;
      background: #aaa;
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30%            { transform: translateY(-6px); }
    }

    /* Quick replies */
    .quick-replies {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      padding: 8px 16px 4px;
      background: #f7f9fc;
    }

    .quick-btn {
      background: #e8f0fe;
      color: #1a73e8;
      border: 1px solid #c5d8fc;
      border-radius: 20px;
      padding: 6px 12px;
      font-size: 12px;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }

    .quick-btn:hover { background: #d2e3fc; }

    /* Input */
    .chat-input {
      display: flex;
      align-items: center;
      padding: 12px 14px;
      border-top: 1px solid #e8eaed;
      background: #fff;
      gap: 10px;
    }

    .chat-input input {
      flex: 1;
      border: 1px solid #e0e0e0;
      border-radius: 24px;
      padding: 10px 16px;
      font-size: 13.5px;
      outline: none;
      transition: border 0.2s;
      background: #f7f9fc;
    }

    .chat-input input:focus { border-color: #1a73e8; background: #fff; }

    .send-btn {
      width: 42px;
      height: 42px;
      background: #1a73e8;
      border: none;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.2s;
    }

    .send-btn:hover { background: #1558b0; }

    .send-btn svg { width: 18px; height: 18px; fill: #fff; }

    /* Footer */
    .chat-footer {
      text-align: center;
      font-size: 11px;
      color: #aaa;
      padding: 6px;
      background: #fff;
    }
  </style>
</head>
<body>

<div class="chat-wrapper">

  <!-- Header -->
  <div class="chat-header">
    <div class="avatar">🦷</div>
    <div class="header-info">
      <h2>Neupane Dental Clinic</h2>
      <p><span class="status-dot"></span>Online · Tilottama-03, Rupandehi, Nepal</p>
    </div>
  </div>

  <!-- Messages -->
  <div class="chat-messages" id="messages">
    <div class="message bot">
      <div class="msg-avatar">🦷</div>
      <div class="bubble">
        Hello! Welcome to <strong>Neupane Dental Clinic</strong>. 😊<br><br>
        I'm your virtual assistant. How can I help you today?
      </div>
    </div>
  </div>

  <!-- Quick Replies -->
  <div class="quick-replies" id="quickReplies">
    <button class="quick-btn" onclick="sendQuick('What services do you offer?')">Our Services</button>
    <button class="quick-btn" onclick="sendQuick('What are the treatment prices?')">Pricing</button>
    <button class="quick-btn" onclick="sendQuick('How do I book an appointment?')">Book Appointment</button>
    <button class="quick-btn" onclick="sendQuick('Who are the doctors?')">Our Doctors</button>
    <button class="quick-btn" onclick="sendQuick('What is root canal treatment?')">Root Canal</button>
    <button class="quick-btn" onclick="sendQuick('How much do dental implants cost?')">Implant Cost</button>
  </div>

  <!-- Input -->
  <div class="chat-input">
    <input
      type="text"
      id="userInput"
      placeholder="Type your question..."
      onkeydown="if(event.key==='Enter') sendMessage()"
      autocomplete="off"
    />
    <button class="send-btn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>

  <div class="chat-footer">Powered by Neupane Dental Clinic AI Assistant</div>

</div>

<script>
  const messagesEl = document.getElementById('messages');
  const inputEl    = document.getElementById('userInput');

  function scrollBottom() {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function addMessage(text, role) {
    const wrap = document.createElement('div');
    wrap.className = `message ${role}`;

    const avatar = document.createElement('div');
    avatar.className = 'msg-avatar';
    avatar.textContent = role === 'bot' ? '🦷' : '👤';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.innerHTML = text.replace(/\n/g, '<br>');

    wrap.appendChild(avatar);
    wrap.appendChild(bubble);
    messagesEl.appendChild(wrap);
    scrollBottom();
    return wrap;
  }

  function showTyping() {
    const wrap = document.createElement('div');
    wrap.className = 'message bot typing';
    wrap.id = 'typingIndicator';

    const avatar = document.createElement('div');
    avatar.className = 'msg-avatar';
    avatar.textContent = '🦷';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';

    wrap.appendChild(avatar);
    wrap.appendChild(bubble);
    messagesEl.appendChild(wrap);
    scrollBottom();
  }

  function removeTyping() {
    const el = document.getElementById('typingIndicator');
    if (el) el.remove();
  }

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text) return;

    inputEl.value = '';
    addMessage(text, 'user');
    showTyping();

    try {
      const res = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text })
      });
      const data = await res.json();
      removeTyping();
      addMessage(data.answer || 'Sorry, something went wrong. Please try again.', 'bot');
    } catch {
      removeTyping();
      addMessage('Connection error. Please try again.', 'bot');
    }
  }

  function sendQuick(text) {
    inputEl.value = text;
    sendMessage();
  }
</script>

</body>
</html>
